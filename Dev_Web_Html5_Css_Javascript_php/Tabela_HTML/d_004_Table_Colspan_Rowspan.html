<!DOCTYPE html>
<html>
<body>
<h2>Tabela Simples Colspan</h2>
  
<!-- Tabela com Colspan -->
<!-- Une duas colunas em uma única célula -->
<table width="100%" border="1">
<tr>
  <td>Aluno</td>
  <td colspan="2">Diciplina</td>
</tr>

<tr>
  <td>Alex</td>
  <td>HTML</td>
  <td>Ambiente WEB</td>
</tr>
</table>

<!-- Tabela com Rowspan -->
<!-- Faz a célula ocupar 2 linhas -->
<h2>Tabela Simples Rowspan</h2>
<table width="100%" border="1">
<tr>
  <td>Aluno</td>
  <td rowspan="2">Diciplina</td>
</tr>

<tr>
  <td>Alex</td>
  <td>HTML</td>
  <td>Ambiente WEB</td>
</tr>
</table>
</body>
</html>
