<!DOCTYPE html>
<html>
  <head>

    <meta charset="utf-8">
    <title>Pagina Paulo Lunardi</title>
  </head>

  <body>
    <h1> Esté é meu primeiro cabeçalho
    </h1>
    <p> Este é o primeiro paragrafo</p>

    <p> Este texto é <strong>importante</strong>.</p>
    <p> Este texto é <em>enfatizado</em>.</p>
    <p> Este texto é <s>tachado</s>.</p>
    <p>H<sub>2</sub>O</p>
  </body>
</html>
