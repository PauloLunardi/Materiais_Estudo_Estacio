<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Exemplo 2 - Box Model em CSS</title>
  <style>
    body{font-size:2rem;
    }

    #container{
      width:1070px;
      margin: 0 auto;
      /*display: flex;*/
      /*flexdirection: row;*/ /*todos os elementos numa única linha*/
      /*flexdirection: column;*/ /*todos os elementos numa única coluna*/ 
    }
    
    /*Uso da pseudoclasse :hover*/
    #link:hover{
      color: orange;
    }

    /*Uso do pseudoelemento ::first-line*/
    #container::first-line {
      color: blue;
      text-transform: uppercase;
    }

  </style>
</head>
<body>
  <div id="container">
    <h1>PseudoClasses</h1>
    <a href="#" id="link">Link</a>

    <h1>PseudoElementos</h1>
    <p id="container">
  </div>
  <div id="box_exemplo">
    Conteúdo do box de exemplo.
  </div>
  <div id="box_final">
    Conteúdo do box final.
  </div>
  
</body>
</html>
