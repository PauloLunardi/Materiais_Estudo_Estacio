<!DOCTYPE html>
<html>

<head>
  <title>Web Fonts</title>

  <style>

    @font-face {
      font-family: "Nunito";
      src: url("Nunito-VariableFont_wght.woff2") format("woff2");
      /* o arquivo convertido precisa estar dentro da pasta que esta o html */
      /* veja arquivo 002 */
      font-weight: bold;
      font-style: normal;
    }

    #container {
      font-family: Nunito;
    }

  </style>
</head>

<body>

  <h1>Usando Web Fontes</h1>

    <p id="container">A utilização de fontes personalizadas permite criar interfaces mais atraentes, melhorar a identidade visual de um projeto e proporcionar uma experiência mais agradável ao usuário. 		</p>

</body>

</html>
