<!DOCTYPE html>
<html>
<body>
<script>

// PARTE 1: Implementação da lógica de ordenação Bubble Sort
const bubble = (v) => {
    let ordenado = false;
    while(!ordenado){
        ordenado = true;
        for(let i=1; i<v.length; i++){
            // Compara o elemento atual com o anterior
            if(v[i-1] > v[i]){
                // Troca os valores de posição usando uma variável auxiliar
                const aux = v[i]; 
                v[i] = v[i-1];
                v[i-1] = aux;
                // Se houve troca, o vetor ainda não estava 100% ordenado
                ordenado = false;
            }
        }
    }
}

// PARTE 2: Declaração dos dados e teste do algoritmo
const valores = [3, 1, 7, 8, 4];

console.log("Antes da ordenação:", valores); 
bubble(valores); // Modifica o vetor original diretamente na memória
console.log("Depois da ordenação:", valores);

/*
SAÍDA ESPERADA NO CONSOLE:
Antes da ordenação: (5) [3, 1, 7, 8, 4]
Depois da ordenação: (5) [1, 3, 4, 7, 8]

NOTA DE REFERÊNCIA (Semelhança com C):
O JavaScript passa arrays por REFERÊNCIA. Por isso, ao rodar `bubble(valores)`, 
as alterações feitas dentro da função afetam o array original fora dela, 
exatamente como o comportamento de ponteiros/vetores em Linguagem C.
*/
</script>
</body>
</html>
