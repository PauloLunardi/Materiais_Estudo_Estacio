<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Sequência de Fibonacci</title>
</head>

<body>

    <h1>Sequência de Fibonacci</h1>

    <label>Posição:</label>
    <input type="number" id="v1" value="10">

    <button onclick="executar()">
        Calcular
    </button>

    <hr>

    <div id="resultado">
        A sequência aparecerá aqui.
    </div>

    <script src="017_Fibonacci.js"></script>

    <script>

        const executar = () => {

            const posicao =
                parseInt(document.getElementById("v1").value);

            const sequencia =
                fibonacci(posicao);

            document.getElementById("resultado").innerHTML =
                `Sequência: ${sequencia.join(", ")}`;

            console.log("Sequência:", sequencia);
        }

    </script>

</body>
</html>
