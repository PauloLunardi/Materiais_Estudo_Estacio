let file = "032_Fetch_Info.txt";

fetch(file)
    .then(x => x.text())
    .then(y => document.getElementById("demo1").innerHTML = y);

async function getText(file) {

    let x = await fetch(file);

    let y = await x.text();

    document.getElementById("demo2")
        .innerHTML = y;

}
