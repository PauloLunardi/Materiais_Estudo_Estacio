<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <title>Estruturas de Repetição JavaScript</title>
</head>

<body>

    <h1>Estruturas de Repetição</h1>

    <button onclick="executar()">
        Executar Exemplos
    </button>

    <div id="resultado">
        Os resultados aparecerão aqui.
    </div>

    <script>

        const executar = () => {

            let texto = "<h2>Resultados</h2>";

            /* ========================= */
            /* Exemplo FOR               */
            /* ========================= */

            texto += "<h3>FOR</h3>";

            for (let i = 1; i <= 5; i++) {
                texto += `Valor: ${i}<br>`;
            }

            /* ========================= */
            /* Exemplo WHILE             */
            /* ========================= */

            texto += "<h3>WHILE</h3>";

            let contador = 1;

            while (contador <= 5) {
                texto += `Contador: ${contador}<br>`;
                contador++;
            }

            /* ========================= */
            /* Exemplo DO WHILE          */
            /* ========================= */

            texto += "<h3>DO / WHILE</h3>";

            let numero = 1;

            do {
                texto += `Número: ${numero}<br>`;
                numero++;
            } while (numero <= 5);

            /* ========================= */
            /* Exemplo FOR IN            */
            /* ========================= */

            texto += "<h3>FOR / IN</h3>";

            const aluno = {
                nome: "Paulo",
                curso: "JavaScript",
                nivel: "Iniciante"
            };

            for (let chave in aluno) {
                texto += `${chave}: ${aluno[chave]}<br>`;
            }

            document.getElementById("resultado").innerHTML = texto;

        }

    </script>

</body>

</html>
