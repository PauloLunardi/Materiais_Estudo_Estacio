<html>
<body>
<script>

// Declaração do vetor inicial (como mostra o print)
const valores = [6,3,1,7,8,4,5];
console.log(valores); 

// SHIFT: Remove e retorna o PRIMEIRO elemento do vetor
console.log(valores.shift()); 
console.log(valores); 

// POP: Remove e retorna o ÚLTIMO elemento do vetor
console.log(valores.pop()); 
console.log(valores);

/*
SAÍDA ESPERADA NO CONSOLE:
(7) [6, 3, 1, 7, 8, 4, 5] --> Vetor inicial
6                         --> Retorno do shift()
(6) [3, 1, 7, 8, 4, 5]    --> Vetor após shift (sem o 6)
5                         --> Retorno do pop()
(5) [3, 1, 7, 8, 4]       --> Vetor após pop (sem o 5)
*/
</script>
</body>
</html>
