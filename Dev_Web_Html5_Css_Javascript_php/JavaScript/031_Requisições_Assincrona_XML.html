<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Requisição Assíncrona XML</title>
</head>
<body>

    <h1>Catálogo de Artistas</h1>

    <p id="demo">Carregando...</p>

    <script>

        const xhttp = new XMLHttpRequest();

        xhttp.onload = function() {

            console.log("XML carregado!");

            const xmlDoc = this.responseXML;

            console.log(xmlDoc);

            const artistas = xmlDoc.getElementsByTagName("ARTIST");

            console.log(artistas);

            let txt = "";

            for(let i = 0; i < artistas.length; i++) {

                txt += artistas[i].childNodes[0].nodeValue + "<br>";

            }

            document.getElementById("demo").innerHTML = txt;

        };

        xhttp.onerror = function() {
            console.log("Erro ao carregar XML");
        };

        xhttp.open("GET", "031_Requisicoes_Assincrona_XML.xml");

        xhttp.send();

    </script>

</body>
</html>
