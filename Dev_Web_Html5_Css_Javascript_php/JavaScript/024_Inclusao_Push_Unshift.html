<html>
<body>
<script>

// Declaração do vetor inicial
const valores = [3,1,7,8,4];
console.log(valores); 

// PUSH: Insere o elemento no FINAL do vetor
valores.push(5);
console.log(valores);

// UNSHIFT: Insere o elemento no INÍCIO do vetor
valores.unshift(6);
console.log(valores);

/*
SAÍDA ESPERADA NO CONSOLE:
(5) [3, 1, 7, 8, 4]      --> Vetor inicial
(6) [3, 1, 7, 8, 4, 5]   --> Após o push (5 no final)
(7) [6, 3, 1, 7, 8, 4, 5] --> Após o unshift (6 no início)
*/
</script>
</body>
</html>
